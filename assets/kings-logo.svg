      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 .45 0 0 .48  0 0 .1 0 .12  0 0 0 .72 0" result="orange"/>
      <feMerge>
