    </filter>
  </defs>
  <text x="160" y="68" text-anchor="middle" filter="url(#glow)" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="500" letter-spacing="0">Kings</text>
</svg>
