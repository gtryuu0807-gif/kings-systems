<section id="maintenanceScreen" class="maintenanceScreen">
    <div class="maintenanceCard">
        <div class="maintenanceIcon" aria-hidden="true"></div>

        <h2 id="maintenanceTitleView">現在メンテナンス中です</h2>

        <p id="maintenanceMessageView" class="maintenanceMessage">
            現在、システムメンテナンスを実施しております。<br>
            サービス再開までしばらくお待ちください。
        </p>

        <div class="maintenanceInfoGrid">
            <div class="maintenanceInfoBox">
                <span>終了予定</span>
                <strong id="maintenanceEndView">未定</strong>
            </div>

            <div class="maintenanceInfoBox">
                <span>実施者</span>
                <strong id="maintenanceUpdatedByView">-</strong>
            </div>

            <div class="maintenanceInfoBox">
                <span>更新日時</span>
                <strong id="maintenanceUpdatedAtView">-</strong>
            </div>
        </div>

        <p class="maintenanceSmallNote">
            管理者がメンテナンスを解除すると、通常画面を利用できます。
        </p>
    </div>
</section>
