<section id="infoScreen" class="infoScreen" hidden>
    <h3>情報</h3>
    <p class="adminSectionHelp">アプリのバージョン情報、更新状態、システム情報を確認できます。</p>

    <div class="infoCard kingsPremiumCard">
        <h4>Kings App</h4>
        <div class="settingsInfoGrid">
            <div><span>Version</span><strong id="infoVersionText">-</strong></div>
            <div><span>Build</span><strong id="infoBuildText">-</strong></div>
            <div><span>Environment</span><strong id="infoEnvironmentText">Production</strong></div>
            <div><span>Last Check</span><strong id="infoLastCheckText">-</strong></div>
        </div>
    </div>

    <div class="infoCard kingsPremiumCard">
        <h4>更新確認</h4>
        <p class="manualAttendanceHelp">画面が古い場合は、最新版を確認できます。</p>
        <button type="button" id="infoCheckUpdateBtn" class="kingsPremiumBtn">更新を確認する</button>
    </div>

    <div class="infoCard kingsPremiumCard">
        <h4>システム情報</h4>
        <p class="manualAttendanceHelp">不具合確認時は、Version / Build と画面上のエラーコードを共有してください。</p>
    </div>

    <button type="button" id="infoBackToMainBtn" class="kingsPremiumBtn">メイン画面へ戻る</button>
</section>
